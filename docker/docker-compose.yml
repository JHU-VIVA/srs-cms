services:
  srs-cms-db:
    container_name: ${APP_STAGE}-srs-cms-db
    restart: always
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      APP_STAGE: ${APP_STAGE:?APP_STAGE not set}
      POSTGRES_DB: ${DB_NAME:?DB_NAME not set}
      POSTGRES_USER: ${DB_USER:?DB_USER not set}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS not set}
      PGPORT: ${DB_PORT:?DB_PORT not set}
    ports:
      - ${DB_PORT}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready --username=${DB_USER} --dbname=${DB_NAME}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  srs-cms-web:
    container_name: ${APP_STAGE}-srs-cms-web
    restart: always
    build:
      context: ../
      dockerfile: docker/Dockerfile
      args:
        APP_STAGE: ${APP_STAGE}
      additional_contexts:
        docker_conf: .
    command: [ "/app/entrypoint_web.sh" ]
    depends_on:
      srs-cms-db:
        condition: service_healthy
        restart: true
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - .env.${APP_STAGE}

  srs-cms-nginx:
    container_name: ${APP_STAGE}-srs-cms-nginx
    restart: always
    build:
      context: ../
      dockerfile: docker/Dockerfile.nginx
      args:
        APP_STAGE: ${APP_STAGE}
      additional_contexts:
        docker_conf: .
    depends_on:
      - srs-cms-web
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      APP_STAGE: ${APP_STAGE:?APP_STAGE not set}

  srs-cms-cron:
    container_name: ${APP_STAGE}-srs-cms-cron
    restart: always
    build:
      context: ../
      dockerfile: docker/Dockerfile
      additional_contexts:
        docker_conf: .
    user: root
    command: [ "/app/entrypoint_cron.sh" ]
    depends_on:
      srs-cms-db:
        condition: service_healthy
        restart: true
    env_file:
      - .env.${APP_STAGE}
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
      - logs_volume:/app/logs

volumes:
  postgres_data:
  static_volume:
  media_volume:
  logs_volume: